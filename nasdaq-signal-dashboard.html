<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>纳指信号看板</title>
  <style>
    :root {
      --bg-primary: #f5f7fa;
      --bg-card: #ffffff;
      --bg-card-hover: #f0f2f5;
      --border: #d0d5dd;
      --text-primary: #1a1d21;
      --text-secondary: #5f6b7a;
      --text-muted: #9aa4b2;
      --green: #00a854;
      --green-bg: rgba(0, 168, 84, 0.10);
      --green-glow: rgba(0, 168, 84, 0.18);
      --red: #d92d20;
      --red-bg: rgba(217, 45, 32, 0.10);
      --red-glow: rgba(217, 45, 32, 0.18);
      --amber: #dc6803;
      --amber-bg: rgba(220, 104, 3, 0.10);
      --amber-glow: rgba(220, 104, 3, 0.16);
      --orange: #e04f16;
      --blue: #2563eb;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100%;
      padding: 16px 12px 40px;
      -webkit-font-smoothing: antialiased;
    }
    #app { max-width: 600px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 16px; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
    header h1 .icon { margin-right: 6px; }
    .update-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .update-time .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); margin-right: 4px; vertical-align: middle;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .fund-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
    .fund-chip {
      font-size: 11px; padding: 3px 8px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 12px;
      color: var(--text-secondary); white-space: nowrap;
    }
    .fund-chip.approx { border-style: dashed; opacity: 0.7; }
    .fund-chip.active { border-color: var(--blue); color: var(--blue); }

    .signal-section { margin-bottom: 12px; }
    .signal-badge {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 22px 16px 18px; border-radius: var(--radius);
      background: var(--bg-card); border: 1px solid var(--border);
      box-shadow: var(--shadow); transition: all 0.4s ease;
    }
    .signal-badge.loading { opacity: 0.6; }
    .signal-badge .signal-icon { font-size: 34px; line-height: 1; margin-bottom: 6px; transition: all 0.3s ease; }
    .signal-badge .signal-label { font-size: 26px; font-weight: 800; letter-spacing: 4px; transition: all 0.3s ease; }
    .signal-badge .signal-sub { font-size: 13px; margin-top: 4px; opacity: 0.8; font-weight: 500; }

    .signal-badge.signal-buy { border-color: var(--green); box-shadow: 0 0 24px var(--green-glow), var(--shadow); }
    .signal-badge.signal-buy .signal-icon { color: var(--green); }
    .signal-badge.signal-buy .signal-label { color: var(--green); }
    .signal-badge.signal-sell { border-color: var(--red); box-shadow: 0 0 24px var(--red-glow), var(--shadow); }
    .signal-badge.signal-sell .signal-icon { color: var(--red); }
    .signal-badge.signal-sell .signal-label { color: var(--red); }
    .signal-badge.signal-hold { border-color: var(--amber); box-shadow: 0 0 16px var(--amber-glow), var(--shadow); }
    .signal-badge.signal-hold .signal-icon { color: var(--amber); }
    .signal-badge.signal-hold .signal-label { color: var(--amber); }

    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; }
    .metric-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .metric-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .metric-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .metric-change { font-size: 11px; margin-top: 2px; font-weight: 500; }
    .metric-change.positive { color: var(--green); }
    .metric-change.negative { color: var(--red); }
    .metric-card .indicator { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .indicator.bullish { background: var(--green-bg); color: var(--green); }
    .indicator.bearish { background: var(--red-bg); color: var(--red); }
    .indicator.neutral { background: var(--amber-bg); color: var(--amber); }

    .details { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .details h3 { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 10px; font-weight: 600; }
    .signal-group { margin-bottom: 6px; }
    .signal-group:last-child { margin-bottom: 0; }
    .signal-group-header { font-size: 10px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
    .signal-group-header.buy-header { color: var(--green); }
    .signal-group-header.sell-header { color: var(--red); }
    .signal-group-header.hold-header { color: var(--text-muted); }
    .signal-item { display: flex; align-items: center; gap: 6px; padding: 5px 8px; font-size: 12px; border-radius: 6px; margin-bottom: 2px; }
    .signal-item.triggered { background: rgba(0,0,0,0.02); }
    .signal-item .check { width: 16px; text-align: center; font-size: 12px; flex-shrink: 0; }
    .signal-item .check.on { color: var(--green); }
    .signal-item .check.off { color: var(--text-muted); opacity: 0.4; }

    .chart-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .chart-section h3 { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
    #chartCanvas { width: 100%; height: auto; display: block; border-radius: 4px; }

    .action-section { margin-bottom: 12px; }
    .action-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; }
    .action-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .action-text { font-size: 18px; font-weight: 700; letter-spacing: 2px; }

    .refresh-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .btn {
      flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-card); color: var(--text-primary); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      text-align: center; font-family: inherit;
    }
    .btn:hover { background: var(--bg-card-hover); border-color: var(--text-secondary); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

    .manual-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px; margin-bottom: 12px; display: none;
    }
    .manual-section.visible { display: block; }
    .manual-section h3 { font-size: 12px; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
    .manual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .manual-field { display: flex; flex-direction: column; gap: 2px; }
    .manual-field label { font-size: 10px; color: var(--text-secondary); }
    .manual-field input { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; padding: 8px; color: var(--text-primary); font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; outline: none; transition: border-color 0.2s; }
    .manual-field input:focus { border-color: var(--blue); }
    .manual-field input::placeholder { color: var(--text-muted); font-weight: 400; font-size: 11px; }

    .source-info {
      font-size: 10px; color: var(--text-muted);
      text-align: center; margin-top: -8px; margin-bottom: 12px;
    }

    footer { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 20px; line-height: 1.8; }
    #errorMsg { color: var(--red); font-size: 11px; margin-top: 6px; word-break: break-word; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--text-muted); border-top-color: var(--text-secondary); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .retry-status {
      font-size: 11px; color: var(--text-secondary);
      text-align: center; margin-bottom: 10px;
      display: none;
    }
    .retry-status.visible { display: block; }

    @media (min-width: 600px) {
      body { padding: 24px 20px 40px; }
      #app { max-width: 720px; }
      .metrics { grid-template-columns: repeat(4, 1fr); }
      header h1 { font-size: 24px; }
      .signal-badge .signal-label { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1><span class="icon">📊</span>纳指信号看板</h1>
      <div class="update-time">
        <span class="dot"></span>
        <span id="updateTime">连接数据中...</span>
      </div>
    </header>

    <div class="fund-bar">
      <span class="fund-chip active">160213</span>
      <span class="fund-chip active">019548</span>
      <span class="fund-chip approx">012920 ≈</span>
      <span class="fund-chip approx">539002 ≈</span>
    </div>

    <div class="retry-status" id="retryStatus"></div>

    <section class="signal-section">
      <div class="signal-badge" id="signalBadge">
        <span class="signal-icon" id="signalIcon">⟳</span>
        <span class="signal-label" id="signalLabel">连接中</span>
        <span class="signal-sub" id="signalSub">正在尝试获取数据...</span>
      </div>
    </section>

    <div class="source-info" id="sourceInfo"></div>

    <section class="metrics">
      <div class="metric-card">
        <div class="metric-label">纳指现价</div>
        <div class="metric-value" id="metricPrice">--</div>
        <div class="metric-change" id="metricPriceChg"></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">20周均线</div>
        <div class="metric-value" id="metricSMA">--</div>
        <div class="metric-sub" id="metricSMAStatus">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">RSI (14)</div>
        <div class="metric-value" id="metricRSI">--</div>
        <div class="metric-sub" id="metricRSIStatus">--</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">距前高</div>
        <div class="metric-value" id="metricDrawdown">--</div>
        <div class="metric-sub" id="metricDDStatus">--</div>
      </div>
    </section>

    <section class="details">
      <h3>信号明细</h3>
      <div id="signalDetailsContent">
        <div class="signal-group">
          <div class="signal-group-header buy-header">📈 买入信号</div>
          <div id="buySignalsList"></div>
        </div>
        <div class="signal-group">
          <div class="signal-group-header sell-header">📉 卖出信号</div>
          <div id="sellSignalsList"></div>
        </div>
        <div class="signal-group">
          <div class="signal-group-header hold-header">➖ 中性</div>
          <div id="holdSignalsList"></div>
        </div>
      </div>
    </section>

    <section class="chart-section">
      <h3>📈 纳指100走势 &nbsp;<span style="font-size:10px;color:var(--text-muted);font-weight:400;">白=价格 橙=20周均线</span></h3>
      <canvas id="chartCanvas" width="800" height="260"></canvas>
    </section>

    <section class="action-section">
      <div class="action-card">
        <div class="action-label">操作建议</div>
        <div class="action-text" id="actionText">--</div>
      </div>
    </section>

    <div class="refresh-row">
      <button class="btn btn-primary" id="refreshBtn" onclick="refreshData()">🔄 刷新</button>
      <button class="btn" onclick="toggleManual()">✏️ 手动</button>
    </div>

    <section class="manual-section" id="manualSection">
      <h3>✏️ 手动输入</h3>
      <p style="font-size:10px;color:var(--text-muted);margin-bottom:8px;">
        如果自动获取失败，从 TradingView / 同花顺查最新周线数据填入
      </p>
      <div class="manual-grid">
        <div class="manual-field">
          <label>现价</label>
          <input type="number" id="manualPrice" step="0.01" placeholder="如 18500">
        </div>
        <div class="manual-field">
          <label>20周均线</label>
          <input type="number" id="manualSMA" step="0.01" placeholder="如 17000">
        </div>
        <div class="manual-field">
          <label>RSI(14)</label>
          <input type="number" id="manualRSI" min="0" max="100" step="0.1" placeholder="0–100">
        </div>
        <div class="manual-field">
          <label>前高(近52周)</label>
          <input type="number" id="manualATH" step="0.01" placeholder="如 20000">
        </div>
      </div>
      <button class="btn btn-primary" onclick="applyManual()" style="margin-top:8px;">✓ 应用</button>
    </section>

    <footer>
      <div>数据来源：Yahoo Finance 经由代理中转 · 信号仅供参考</div>
      <div id="errorMsg"></div>
    </footer>
  </div>

  <script>
    const SMA_P = 20, RSI_P = 14, OVERSOLD = 35, OVERBOUGHT = 70;

    async function fetchSignals() {
      const resp = await fetch('/api/signals', {
        signal: AbortSignal.timeout(15000),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      if (!json.ok) throw new Error(json.error || 'API 异常');
      return json.data;
    }

    // ── 指标计算（手动模式用） ──

    function calcSMA(prices, period) {
      const r = [];
      for (let i = 0; i < prices.length; i++) {
        if (i < period - 1) { r.push(null); continue; }
        let s = 0; for (let j = i - period + 1; j <= i; j++) s += prices[j];
        r.push(s / period);
      }
      return r;
    }

    function calcRSI(prices, period) {
      if (prices.length < period + 1) return prices.map(() => null);
      const ch = [];
      for (let i = 1; i < prices.length; i++) ch.push(prices[i] - prices[i - 1]);
      const rsi = [null];
      let ag = 0, al = 0;
      for (let i = 0; i < period; i++) {
        if (ch[i] > 0) ag += ch[i]; else al += Math.abs(ch[i]);
      }
      ag /= period; al /= period;
      rsi.push(al < 0.0001 ? 100 : 100 - 100 / (1 + ag / al));
      for (let i = period; i < ch.length; i++) {
        const g = ch[i] > 0 ? ch[i] : 0, l = ch[i] < 0 ? Math.abs(ch[i]) : 0;
        ag = (ag * (period - 1) + g) / period;
        al = (al * (period - 1) + l) / period;
        rsi.push(al < 0.0001 ? 100 : 100 - 100 / (1 + ag / al));
      }
      return rsi;
    }

    // ── 信号引擎 ──

    function evaluate(candles) {
      const prices = candles.map(c => c.close);
      const sma = calcSMA(prices, SMA_P);
      const rsi = calcRSI(prices, RSI_P);
      const last = candles.length - 1;
      const price = prices[last];
      const smaVal = sma[last];
      const rsiVal = rsi[last];
      const ath = Math.max(...prices);
      const dd = (price - ath) / ath;
      const smaDist = smaVal > 0 ? (price - smaVal) / smaVal : 0;

      const s = { price, smaVal, rsiVal, drawdown: dd, smaDist, aboveSMA: price >= smaVal, buy: [], sell: [], hold: [], score: 0, sma, rsi };

      if (!s.aboveSMA && smaDist < -0.02) { s.buy.push({ text:'跌破20周均线 2%+', detail:(smaDist*100).toFixed(1)+'%' }); s.score += 2; }
      else if (!s.aboveSMA && smaDist < 0) { s.buy.push({ text:'略低于20周均线', detail:(smaDist*100).toFixed(1)+'%' }); s.score += 1; }
      else { s.hold.push({ text:'在20周均线上方', detail:'+'+(smaDist*100).toFixed(1)+'%' }); }

      if (rsiVal !== null && rsiVal < OVERSOLD) { s.buy.push({ text:'RSI 超卖 (<'+OVERSOLD+')', detail:rsiVal.toFixed(1) }); s.score += 2; }
      else if (rsiVal !== null && rsiVal < OVERSOLD+5) { s.buy.push({ text:'RSI 偏低', detail:rsiVal.toFixed(1) }); s.score += 1; }
      else if (rsiVal !== null && rsiVal > OVERBOUGHT) { s.sell.push({ text:'RSI 超买 (>'+OVERBOUGHT+')', detail:rsiVal.toFixed(1) }); s.score -= 2; }
      else if (rsiVal !== null && rsiVal > 60) { s.sell.push({ text:'RSI 偏高', detail:rsiVal.toFixed(1) }); s.score -= 1; }
      else if (rsiVal !== null) { s.hold.push({ text:'RSI 中性', detail:rsiVal.toFixed(1) }); }

      if (dd < -0.15) { s.buy.push({ text:'从前高回撤 >15%', detail:(dd*100).toFixed(1)+'%' }); s.score += 2; }
      else if (dd < -0.10) { s.buy.push({ text:'回撤 10–15%', detail:(dd*100).toFixed(1)+'%' }); s.score += 1; }
      else if (dd < -0.05) { s.hold.push({ text:'小幅回调', detail:(dd*100).toFixed(1)+'%' }); }
      else { s.hold.push({ text:'接近前高', detail:(dd*100).toFixed(1)+'%' }); }

      if (s.score >= 3) s.overall = 'BUY';
      else if (s.score <= -3) s.overall = 'SELL';
      else if (s.buy.length > 0 && s.sell.length === 0) s.overall = 'BUY';
      else if (s.sell.length > 0 && s.buy.length === 0) s.overall = 'SELL';
      else if (s.buy.length > 0 && s.sell.length > 0) s.overall = s.score > 0 ? 'BUY' : s.score < 0 ? 'SELL' : 'HOLD';
      else s.overall = 'HOLD';

      const bc=s.buy.length, sc=s.sell.length;
      if (s.overall==='BUY') s.intensity = (bc>=3||s.score>=4)?'⚡ 加仓':(bc>=2||s.score>=2)?'📈 加仓':'🌱 轻仓加注';
      else if (s.overall==='SELL') s.intensity = (sc>=2||s.score<=-4)?'⚠️ 减仓/止盈':'🔻 小幅减仓';
      else s.intensity = '⏸️ 持有/观望';

      return s;
    }

    // ── 图表 ──

    function renderChart(candles, sma) {
      const canvas = document.getElementById('chartCanvas');
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(rect.width - 28, 280);
      const h = 240;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
      const pad = { top: 14, bottom: 24, left: 8, right: 8 };
      const cw = w - pad.left - pad.right, ch = h - pad.top - pad.bottom;
      const valid = candles.filter(c => c.close > 0);
      if (valid.length < 2) return;
      const allP = valid.map(c => c.close);
      const allS = sma.filter(v => v !== null && v > 0);
      const minV = Math.min(...allP, ...allS), maxV = Math.max(...allP, ...allS);
      const range = maxV - minV || 1;
      const yMin = minV - range * 0.08, yMax = maxV + range * 0.08, yR = yMax - yMin;
      const x = i => pad.left + (i / (valid.length - 1)) * cw;
      const y = v => pad.top + ch - ((v - yMin) / yR) * ch;

      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) { const yy = pad.top + (ch / 5) * i; ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(w - pad.right, yy); ctx.stroke(); }

      ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
      ctx.beginPath();
      let started = false;
      for (let i = 0; i < valid.length; i++) {
        const sv = sma[i]; if (sv == null) continue;
        if (!started) { ctx.moveTo(x(i), y(sv)); started = true; } else ctx.lineTo(x(i), y(sv));
      }
      ctx.stroke(); ctx.setLineDash([]);

      const lastSMA = sma.length - 1 - sma.slice().reverse().findIndex(v => v != null && v > 0);
      if (lastSMA >= 0 && sma[lastSMA]) {
        ctx.fillStyle = '#f97316'; ctx.font = '10px sans-serif';
        ctx.fillText('20W MA', x(lastSMA) - 16, y(sma[lastSMA]) - 6);
      }

      const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      grad.addColorStop(0, 'rgba(37, 99, 235, 0.15)');
      grad.addColorStop(1, 'rgba(37, 99, 235, 0.01)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x(0), y(valid[0].close));
      for (let i = 1; i < valid.length; i++) ctx.lineTo(x(i), y(valid[i].close));
      ctx.lineTo(x(valid.length - 1), pad.top + ch);
      ctx.lineTo(x(0), pad.top + ch);
      ctx.closePath(); ctx.fill();

      ctx.strokeStyle = '#1a1d21'; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x(0), y(valid[0].close));
      for (let i = 1; i < valid.length; i++) ctx.lineTo(x(i), y(valid[i].close));
      ctx.stroke();

      const lp = valid[valid.length - 1].close;
      ctx.fillStyle = '#1a1d21'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(lp.toLocaleString('en-US'), x(valid.length - 1) - 4, y(lp) - 6);

      ctx.fillStyle = '#9aa4b2'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(valid.length / 8));
      for (let i = 0; i < valid.length; i += step) {
        const d = valid[i].date;
        ctx.fillText(d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0'), x(i), pad.top + ch + 14);
      }
    }

    // ── UI 更新 ──

    function fmtPrice(n) { return n==null||isNaN(n)?'--':n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
    function fmtPct(n) { return n==null||isNaN(n)?'--':(n>=0?'+':'')+(n*100).toFixed(1)+'%'; }

    function updateUI(s) {
      const { price, smaVal, rsiVal, drawdown, smaDist, aboveSMA, overall, intensity, buy, sell, hold } = s;
      const badge = document.getElementById('signalBadge');
      const icon = document.getElementById('signalIcon');
      const label = document.getElementById('signalLabel');
      const sub = document.getElementById('signalSub');
      badge.classList.remove('signal-buy','signal-sell','signal-hold','signal-mixed','loading');
      let cls, ic, lb;
      if (overall === 'BUY') { cls='signal-buy'; ic='🟢'; lb='买入'; }
      else if (overall === 'SELL') { cls='signal-sell'; ic='🔴'; lb='卖出'; }
      else { cls='signal-hold'; ic='🟡'; lb='持有'; }
      badge.classList.add(cls);
      icon.textContent = ic; label.textContent = lb; sub.textContent = intensity;

      document.getElementById('metricPrice').textContent = price ? fmtPrice(price) : '--';
      const cEl = document.getElementById('metricPriceChg');
      if (smaDist != null && !isNaN(smaDist)) {
        cEl.textContent = aboveSMA ? '+' + (smaDist*100).toFixed(1) + '%' : (smaDist*100).toFixed(1) + '%';
        cEl.className = 'metric-change ' + (aboveSMA ? 'positive' : 'negative');
      } else { cEl.textContent=''; cEl.className='metric-change'; }

      document.getElementById('metricSMA').textContent = smaVal ? fmtPrice(smaVal) : '--';
      const smaSt = document.getElementById('metricSMAStatus');
      if (smaVal && price) smaSt.innerHTML = '<span class="indicator '+(aboveSMA?'bullish':'bearish')+'">'+(aboveSMA?'上方':'下方')+'</span>';
      else smaSt.textContent='--';

      document.getElementById('metricRSI').textContent = rsiVal!=null&&!isNaN(rsiVal)?rsiVal.toFixed(1):'--';
      const rsiSt = document.getElementById('metricRSIStatus');
      if (rsiVal!=null&&!isNaN(rsiVal)) {
        let rc='neutral',rt='中性';
        if (rsiVal>OVERBOUGHT) { rc='bearish'; rt='超买'; }
        else if (rsiVal>60) { rc='bearish'; rt='偏高'; }
        else if (rsiVal<OVERSOLD) { rc='bullish'; rt='超卖'; }
        else if (rsiVal<OVERSOLD+5) { rc='bullish'; rt='偏低'; }
        rsiSt.innerHTML = '<span class="indicator '+rc+'">'+rt+'</span>';
      } else rsiSt.textContent='--';

      document.getElementById('metricDrawdown').textContent = fmtPct(drawdown);
      const ddSt = document.getElementById('metricDDStatus');
      if (drawdown!=null&&!isNaN(drawdown)) {
        let dc='neutral',dt='正常';
        if (drawdown<-0.15) { dc='bullish'; dt='深度回调'; }
        else if (drawdown<-0.10) { dc='bullish'; dt='较大回调'; }
        else if (drawdown<-0.05) { dc='neutral'; dt='小幅回调'; }
        else { dc='bearish'; dt='接近前高'; }
        ddSt.innerHTML = '<span class="indicator '+dc+'">'+dt+'</span>';
      } else ddSt.textContent='--';

      function renderList(items, cid) {
        const el = document.getElementById(cid);
        if (!items.length) { el.innerHTML='<div style="font-size:11px;color:var(--text-muted);padding:4px 8px;">无触发信号</div>'; return; }
        el.innerHTML = items.map(x => '<div class="signal-item triggered"><span class="check on">✓</span><span>'+x.text+'</span><span style="margin-left:auto;font-size:10px;color:var(--text-secondary);">'+x.detail+'</span></div>').join('');
      }
      renderList(buy,'buySignalsList');
      renderList(sell,'sellSignalsList');
      renderList(hold,'holdSignalsList');

      const act = document.getElementById('actionText');
      if (overall === 'BUY') { act.textContent = intensity+' · 160213 / 019548'; act.style.color='var(--green)'; }
      else if (overall === 'SELL') { act.textContent = intensity+' · 分批执行'; act.style.color='var(--red)'; }
      else { act.textContent = '⏸️ 保持现有仓位'; act.style.color='var(--amber)'; }
    }

    // ── 主流程 ──

    async function refreshData() {
      const btn = document.getElementById('refreshBtn');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 获取中...';
      document.getElementById('errorMsg').textContent = '';
      const badge = document.getElementById('signalBadge');
      badge.classList.add('loading');

      try {
        const data = await fetchSignals();

        // 服务端已算好所有指标，直接拿结果
        const s = data;

        // 构造一个完整的 signals 对象供 updateUI 使用
        const signals = {
          price: s.price, smaVal: s.smaVal, rsiVal: s.rsiVal,
          drawdown: s.drawdown, smaDist: s.smaDist, aboveSMA: s.aboveSMA,
          overall: s.overall, intensity: s.intensity,
          buy: s.signals.buy.map(t => ({ text: t, detail: '' })),
          sell: s.signals.sell.map(t => ({ text: t, detail: '' })),
          hold: s.signals.hold.map(t => ({ text: t, detail: '' })),
          score: s.score, sma: [], rsi: [],
        };

        // 重建蜡烛图和 SMA 数组用于画图
        const candles = s.candles.map(c => ({ date: new Date(c.t), close: c.p }));
        const smaArr = s.candles.map(c => c.sma);

        updateUI(signals);
        renderChart(candles, smaArr);

        const now = new Date();
        document.getElementById('updateTime').innerHTML =
          '<span class="dot"></span> '+now.toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})+' · 数据已更新';
        document.getElementById('sourceInfo').textContent =
          '数据来源：Yahoo Finance ⚡ 服务端直连';
        document.getElementById('manualSection').classList.remove('visible');
        document.getElementById('retryStatus').className = 'retry-status';
      } catch (err) {
        console.error(err);
        document.getElementById('errorMsg').textContent = '⚠️ 数据获取失败：'+err.message+'。请确认服务已启动（终端运行 node server.mjs）。';
        badge.classList.remove('loading');
        document.getElementById('signalIcon').textContent = '⚠️';
        document.getElementById('signalLabel').textContent = '无数据';
        document.getElementById('signalSub').textContent = '启动服务后刷新';
        document.getElementById('sourceInfo').textContent = '';
      } finally {
        btn.disabled = false;
        btn.innerHTML = '🔄 刷新';
        badge.classList.remove('loading');
      }
    }

    function toggleManual() { document.getElementById('manualSection').classList.toggle('visible'); }

    function applyManual() {
      const price = parseFloat(document.getElementById('manualPrice').value);
      const sma = parseFloat(document.getElementById('manualSMA').value);
      const rsi = parseFloat(document.getElementById('manualRSI').value);
      const ath = parseFloat(document.getElementById('manualATH').value);
      if (!price || !sma || rsi===undefined||isNaN(rsi)||!ath) {
        document.getElementById('errorMsg').textContent='⚠️ 请完整填写四个字段'; return;
      }
      const base = new Date();
      const fakeP = [], fakeC = [];
      for (let i=29;i>=0;i--) {
        const t=new Date(base); t.setDate(t.getDate()-i*7);
        const ratio=(30-i)/30;
        const p=sma+(price-sma)*ratio+(Math.random()-0.5)*(price-sma)*0.15;
        fakeC.push({date:t,close:p}); fakeP.push(p);
      }
      fakeC[29].close=price; fakeP[29]=price;

      const fakeSMA=calcSMA(fakeP,SMA_P);
      const dd=(price-Math.max(ath,price))/Math.max(ath,price);
      const smaDist=(price-sma)/sma;
      const s={price,smaVal:sma,rsiVal:rsi,drawdown:dd,smaDist,aboveSMA:price>=sma,buy:[],sell:[],hold:[],score:0,sma:fakeSMA,rsi:[]};

      if (!s.aboveSMA && smaDist<-0.02) { s.buy.push({text:'跌破20周均线 2%+',detail:(smaDist*100).toFixed(1)+'%'}); s.score+=2; }
      else if (!s.aboveSMA && smaDist<0) { s.buy.push({text:'略低于20周均线',detail:(smaDist*100).toFixed(1)+'%'}); s.score+=1; }
      else { s.hold.push({text:'在20周均线上方',detail:'+'+(smaDist*100).toFixed(1)+'%'}); }

      if (rsi<OVERSOLD) { s.buy.push({text:'RSI 超卖 (<'+OVERSOLD+')',detail:rsi.toFixed(1)}); s.score+=2; }
      else if (rsi<OVERSOLD+5) { s.buy.push({text:'RSI 偏低',detail:rsi.toFixed(1)}); s.score+=1; }
      else if (rsi>OVERBOUGHT) { s.sell.push({text:'RSI 超买 (>'+OVERBOUGHT+')',detail:rsi.toFixed(1)}); s.score-=2; }
      else if (rsi>60) { s.sell.push({text:'RSI 偏高',detail:rsi.toFixed(1)}); s.score-=1; }
      else { s.hold.push({text:'RSI 中性',detail:rsi.toFixed(1)}); }

      if (dd<-0.15) { s.buy.push({text:'回撤 >15%',detail:(dd*100).toFixed(1)+'%'}); s.score+=2; }
      else if (dd<-0.10) { s.buy.push({text:'回撤 10–15%',detail:(dd*100).toFixed(1)+'%'}); s.score+=1; }
      else if (dd<-0.05) { s.hold.push({text:'小幅回调',detail:(dd*100).toFixed(1)+'%'}); }
      else { s.hold.push({text:'接近前高',detail:(dd*100).toFixed(1)+'%'}); }

      if (s.score>=3) s.overall='BUY';
      else if (s.score<=-3) s.overall='SELL';
      else if (s.buy.length>0&&s.sell.length===0) s.overall='BUY';
      else if (s.sell.length>0&&s.buy.length===0) s.overall='SELL';
      else if (s.buy.length>0&&s.sell.length>0) s.overall=s.score>0?'BUY':s.score<0?'SELL':'HOLD';
      else s.overall='HOLD';

      const bc=s.buy.length, sc=s.sell.length;
      if (s.overall==='BUY') s.intensity=(bc>=3||s.score>=4)?'⚡ 加仓':(bc>=2||s.score>=2)?'📈 加仓':'🌱 轻仓加注';
      else if (s.overall==='SELL') s.intensity=(sc>=2||s.score<=-4)?'⚠️ 减仓/止盈':'🔻 小幅减仓';
      else s.intensity='⏸️ 持有/观望';

      updateUI(s);
      renderChart(fakeC,fakeSMA);
      document.getElementById('updateTime').innerHTML='<span class="dot"></span> '+new Date().toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'})+' · 手动输入';
      document.getElementById('errorMsg').textContent='';
      document.getElementById('sourceInfo').textContent = '';
    }

    window.addEventListener('DOMContentLoaded', refreshData);
  </script>
</body>
